<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello from Deployer Agent</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, sans-serif;
        background: radial-gradient(800px 400px at 50% 0%, #1a1730, #0a0a0f);
        color: #f4f4f8;
      }
      .card {
        text-align: center;
        padding: 40px 48px;
        border: 1px solid #2a2a38;
        border-radius: 16px;
        background: #14141c;
      }
      h1 {
        margin: 0 0 8px;
        background: linear-gradient(135deg, #6d5efc, #00d8ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p {
        color: #9a9aae;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>It works! 🚀</h1>
      <p>Deployed to Vercel with Deployer Agent.</p>
    </div>
  </body>
</html>
